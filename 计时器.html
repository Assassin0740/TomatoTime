<!DOCTYPE html>

        }

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background-position: center;
            opacity: 0;
            transition: opacity 1s ease;

            font-weight: 600;
            text-transform: uppercase;

            padding-left: 8px;
            border-left: 3px solid #00a1d6;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 6px 0;
        }

        .settings-row label {
            font-size: 13px;
            color: #e0e0e0;
            font-weight: 500;
            margin-right: auto;
        }

        .color-picker-wrapper {
            width: 150px;
            height: 24px;
            cursor: pointer;
        }

        .color-picker-wrapper input[type="color"] {
            width: 100%;
            height: 100%;
            border: none;
            cursor: pointer;
            background: transparent;
            padding: 0;
            opacity: 1;
        }

        .color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker-wrapper input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }

        .settings-row input[type="range"] {
            width: 150px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            outline: none;
        }

        .settings-row input[type="range"]::-webkit-slider-runnable-track {
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .settings-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #00a1d6;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: -6px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .settings-row input[type="range"]::-webkit-slider-thumb:hover {
            background: #00c5ff;
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .settings-row input[type="color"] {
            width: 42px;
            height: 26px;
            padding: 0;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .settings-row input[type="color"]:hover {
            border-color: rgba(0, 161, 214, 0.6);
        }

        .collapsible-header {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(0, 161, 214, 0.1);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .collapsible-header:hover {
            background: rgba(0, 161, 214, 0.18);
        }

        .collapsible-header h4 {
            margin: 0 !important;
            color: #00c5ff !important;
            font-size: 12px !important;
            font-weight: 600 !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            padding-left: 0 !important;
            border-left: none !important;
        }

        #bgSelectorArrow {
            color: #888;
            font-size: 12px;
            transition: transform 0.3s;
        }

        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .collapsible-content.show {
            max-height: 350px;
            overflow-y: auto;
        }

        .collapsible-content::-webkit-scrollbar {
            width: 4px !important;
            height: 0;
            background: transparent;
        }

        .collapsible-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .collapsible-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .collapsible-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: 0.3s;
            border-radius: 26px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: #888;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: #00a1d6;
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(22px);
            background-color: #fff;
        }

        .clean-mode .time.no-pulse {
            animation: none;
        }

        .time.glow {
            text-shadow: 0 0 var(--glow-intensity, 40px) var(--glow-color, #00a1d6), 0 0 calc(var(--glow-intensity, 40px) * 2) var(--glow-color, #00a1d6);
        }

        .bg-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
            margin-top: 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        .bg-selector::-webkit-scrollbar {
            width: 4px;
            height: 4px;
            background: transparent;
        }

        .bg-selector::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .bg-selector::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .bg-selector::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .bg-thumb {
            width: 100%;
            height: 85px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            justify-self: center;
        }

        .bg-thumb:hover {
            border-color: #888;
            transform: scale(1.15);
        }

        .bg-thumb.active {
            border-color: #00a1d6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 30px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);

            display: flex;
            flex-direction: column;

        }

        }

        .mode {

        .clean-mode .time {
            font-size: 160px;
            transform: scale(1.1);

        @keyframes pulse {

        .btn-group {

            justify-content: center;

        .time {

            flex: 1;
            color: #ccc;
            font-size: 14px;
            word-break: break-all;
        }

        .comment-delete {
            color: #ff4444;
            cursor: pointer;
            margin-left: 8px;
            font-size: 12px;
        }

        .comment-input-area {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            margin-top: 6px;
        }

        .comment-input-wrapper {
            flex: 1;
            position: relative;
        }

        .comment-input {
            width: 100%;
            background: #151515;
            border: 1px solid #333;
            color: #ccc;
            padding: 16px 20px;
            font-size: 15px;
            border-radius: 8px;
            min-height: 90px;
            line-height: 1.5;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 6px;
            outline: none;
        }

        .comment-input:empty:not(:focus)::before {
            content: attr(data-placeholder);
            color: #555;
            pointer-events: none;
        }

        .send-btn {
            padding: 14px 24px;
            background: #00a1d6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            height: 40px;
        }

        .emoji-toggle {
            padding: 10px 16px;
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            color: #888;
            font-size: 14px;
            transition: all 0.2s;
            height: 40px;
        }

        .emoji-toggle:hover {
            background: #333;
            color: #fff;
        }

        .emoji-panel {
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 8px;
            padding: 12px;
            background: #111;
            border-radius: 8px;
            max-height: 280px;
            overflow-y: auto;
        }

        .emoji-panel.show {
            display: grid;
        }

        .emoji {
            width: 65px;
            height: 65px;
            cursor: pointer;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid transparent;
            transition: all 0.15s;
        }

        .emoji-import-btn {
            width: 65px;
            height: 65px;
            cursor: pointer;
            border-radius: 8px;
            border: 2px dashed #444;
            background: rgba(255, 255, 255, 0.05);
            color: #666;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .emoji-import-btn:hover {
            border-color: #00a1d6;
            color: #00a1d6;
            background: rgba(0, 161, 214, 0.1);
        }

        .emoji:hover {
            border-color: #888;
            transform: scale(1.15);
        }

        .preview-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .preview-img:hover::after {
            content: '×';
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            background: #ff4444;
            border-radius: 50%;
            font-size: 14px;
            text-align: center;
            line-height: 20px;
            z-index: 10;
        }

        .priority-tag,
        .type-tag {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 5px;
        }

        .table-view-container {
            display: none;
            margin-top: 20px;
            overflow-x: auto;
        }

        .table-view-container.active {
            display: block;
        }

        .task-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30, 30, 30, 0.8);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .task-table th,
        .task-table td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .task-table th:nth-child(3),
        .task-table td:nth-child(3) {
            width: 100px;
        }

        .task-table th:nth-child(2),
        .task-table td:nth-child(2) {
            width: 85px;
        }

        .task-table th {
            background: rgba(0, 0, 0, 0.3);
            font-weight: 600;
            color: #aaa;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .task-table tr:last-child td {
            border-bottom: none;
        }

        .table-content {
            max-width: 220px;
            word-break: break-all;
            white-space: normal;
            line-height: 1.5;
        }

        .view-toggle-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ccc;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .view-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .view-toggle-btn.active {
            background: rgba(76, 175, 80, 0.3);
            border-color: rgba(76, 175, 80, 0.5);
            color: #81c784;
        }

        /* 归档历史折叠面板容器 */
        .archive-container {
            margin-top: 30px;
            background: rgba(30, 30, 30, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
        }

        /* 归档历史主标题栏 */
        .archive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 10px 5px;
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
            user-select: none;
            transition: color 0.2s ease;
        }

        .archive-header:hover {
            color: #fff;
        }

        .archive-header-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .archive-header-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: #aaa;
        }

        .archive-header-arrow {
            transition: transform 0.3s ease;
            font-size: 14px;
        }

        .archive-header.active .archive-header-arrow {
            transform: rotate(90deg);
        }

        /* 按天折叠的分组 */
        .archive-group {
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .archive-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            font-size: 14px;
            color: #bbb;
            user-select: none;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .archive-group-header:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }

        .archive-group-arrow {
            transition: transform 0.3s ease;
        }

        .archive-group-header.active .archive-group-arrow {
            transform: rotate(90deg);
        }

        /* 归档历史的任务列表项 */
        .archive-group-content {
            display: none;
            padding: 10px 5px 0 5px;
        }

        .archive-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 16px;
            background: rgba(20, 20, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .archive-item:hover {
            background: rgba(30, 30, 30, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .archive-item-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .archive-item-content {
            color: #ddd;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-all;
        }

        .archive-item-content img {
            max-width: 150px;
            max-height: 100px;
            object-fit: contain;
            border-radius: 6px;
            margin-top: 6px;
            display: block;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .archive-item-content img:hover {
            transform: scale(1.05);
        }

        .archive-item-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            flex-wrap: wrap;
        }

        .archive-time-tag {
            color: #888;
        }

        .archive-item-right {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-left: 15px;
        }

        .archive-btn-recover {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.2);
            color: #81c784;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .archive-btn-recover:hover {
            background: rgba(76, 175, 80, 0.3);
            color: #fff;
        }

        .archive-btn-delete {
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid rgba(244, 67, 54, 0.2);
            color: #ef5350;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .archive-btn-delete:hover {
            background: rgba(244, 67, 54, 0.3);
            color: #fff;
        }

        /* 图片查看大图的 Modal 效果 */
        .img-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .img-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .date-filter-btn {
            padding: 5px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .date-filter-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .date-filter-btn.active {
            background: rgba(76, 175, 80, 0.3);
            border-color: rgba(76, 175, 80, 0.5);
            color: #81c784;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>

    <div class="bg-container" id="bgContainer">
        <div class="bg-overlay" id="bgOverlay"></div>
    </div>

    <button class="settings-btn" id="settingsBtn">⚙</button>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-section">
            <h4>基础设置</h4>
            <div class="settings-row">
                <label>背景明暗</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="darknessSlider" min="0" max="100" value="70">
                    <span id="darknessValue" style="font-size: 12px; color: #888; width: 40px; text-align: right;">70%</span>
                </div>
            </div>
            <div class="settings-row">
                <label>音量大小</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="volumeSlider" min="0" max="300" value="100">
                    <span id="volumeValue" style="font-size: 12px; color: #888; width: 40px; text-align: right;">100%</span>
                </div>
            </div>
            <div class="settings-row">
                <label>完整文字大小</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="normalFontSizeSlider" min="50" max="500" value="100">
                    <span id="normalFontSizeValue" style="font-size: 12px; color: #888; width: 40px; text-align: right;">100%</span>
                </div>
            </div>
            <div class="settings-row">
                <label>纯净文字大小</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="cleanFontSizeSlider" min="50" max="500" value="100">
                    <span id="cleanFontSizeValue" style="font-size: 12px; color: #888; width: 40px; text-align: right;">100%</span>
                </div>
            </div>
            <div class="settings-row">
                <label>模式标签大小</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="modeLabelSizeSlider" min="50" max="300" value="100">
                    <span id="modeLabelSizeValue" style="font-size: 12px; color: #888; width: 40px; text-align: right;">100%</span>
                </div>
            </div>
            <div class="settings-row">
                <label>呼吸效果</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="pulseToggle" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="settings-row">
                <label>显示模式标签</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="showModeLabel" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <div class="settings-section">
            <h4>颜色设置</h4>
            <div class="settings-row">
                <label>倒计时颜色</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="timerColorPicker" value="#ffffff">
                </div>
            </div>
            <div class="settings-row">
                <label>是否发光</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="glowEnabled" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="settings-row">
                <label>发光颜色</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="glowColorPicker" value="#00a1d6">
                </div>
            </div>
            <div class="settings-row">
                <label>发光程度</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="glowIntensitySlider" min="0" max="100" value="50">
                    <span id="glowIntensityValue" style="font-size: 12px; color: #888; width: 40px; text-align: right;">50%</span>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <h4>悬浮窗设置</h4>
            <div class="settings-row">
                <label>阴影颜色</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="shadowColorPicker" value="#000000">
                </div>
            </div>
            <div class="settings-row">
                <label>阴影大小</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="shadowSizeSlider" min="0" max="100" value="20">
                    <span id="shadowSizeValue" style="font-size: 12px; color: #888; width: 40px; text-align: right;">20%</span>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="collapsible-header" onclick="toggleCollapsible('bgSelector')">
                <h4 style="display: inline;">选择背景</h4>
                <span id="bgSelectorArrow">▼</span>
            </div>
            <div id="bgSelectorContainer" class="collapsible-content">
                <div class="bg-selector" id="bgSelector"></div>
                <button id="importBgBtn" style="margin-top: 10px; padding: 8px 16px; background: rgba(76, 175, 80, 0.2); border: 1px solid rgba(76, 175, 80, 0.5); color: #81c784; border-radius: 6px; cursor: pointer; font-size: 13px; width: 100%;">导入背景图片</button>
            </div>
        </div>
        <input type="file" id="bgFileInput" accept="image/*" style="display: none;">
    </div>

    <div class="container">
        <div class="timer-section">
            <div class="mode" id="modeText">工作时间</div>
            <div class="time" id="timeText">
                <span id="min">25</span>:<span id="sec">00</span>
            </div>

            <div class="btn-group">
                <button id="startBtn">开始</button>
                <button id="saveTimeBtn">保存</button>
                <button id="switchBtn">切换</button>
                <div style="display: inline-flex; align-items: center;">
                    <button id="openFloatBtn">悬浮窗</button>
                    <button id="floatLockBtn" style="display: none; margin-left: 5px; padding: 8px 12px; font-size: 16px;" title="锁定/解锁悬浮窗">🔓</button>
                </div>
                <button id="toggleCleanMode">纯净模式</button>
            </div>
        </div>

        <div class="notes-container">
            <div class="tool-bar">
                <div class="sort-buttons">
                    <button id="sortTime" class="sort-btn">时间 <span>↑</span></button>
                    <button id="sortPriority" class="sort-btn">紧急 <span>↑</span></button>
                    <button id="sortDone" class="sort-btn">未完成 <span>↑</span></button>
                </div>
                <div class="filter-dropdown">
                    <button id="filterToggle" class="filter-toggle-btn">筛选: 全部 ▼</button>
                    <div id="filterMenu" class="filter-menu">
                        <button id="filterAll" class="filter-option active">全部</button>
                        <button id="filterUndone" class="filter-option">未完成</button>
                        <button id="filterDone" class="filter-option">已完成</button>
                        <button id="filterP3" class="filter-option">紧急</button>
                        <button id="filterP2" class="filter-option">中等</button>
                        <button id="filterP1" class="filter-option">不紧急</button>
                    </div>
                </div>
            </div>

            <div class="note-input-wrapper">
                <div id="noteInput" class="note-input" contenteditable="true" placeholder="输入本次任务…"></div>
                <div class="priority-row">
                    <div class="priority-btn p1 active" data-p="1">① 不紧急</div>
                    <div class="priority-btn p2" data-p="2">② 中等</div>
                    <div class="priority-btn p3" data-p="3">③ 紧急</div>
                </div>
                <div class="type-row">
                    <div class="type-btn short active" data-type="short">短期</div>
                    <div class="type-btn long" data-type="long">长期</div>
                </div>
                <div class="action-buttons">
                    <button id="addNoteBtn">添加</button>
                    <button id="clearNotes">清空</button>
                    <button id="archiveBtn" style="background: rgba(103, 58, 183, 0.25); border: 1px solid rgba(103, 58, 183, 0.4); color: #b39ddb; margin-left: 5px;">归档已完成</button>
                    <button id="exportBtn">导出</button>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="view-toggle-btn active" onclick="toggleView('card')">卡片视图</button>
                <button class="view-toggle-btn" onclick="toggleView('table')">表格视图</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="type-toggle-btn active" onclick="toggleTypeView('all')">全部</button>
                <button class="type-toggle-btn" onclick="toggleTypeView('short')">短期</button>
                <button class="type-toggle-btn" onclick="toggleTypeView('long')">长期</button>
            </div>
            
            <div id="notesList"></div>

            <!-- 归档历史面板 -->
            <div class="archive-container" id="archiveContainer">
                <div class="archive-header" id="archiveHeader" onclick="toggleArchiveMainPanel()">
                    <div class="archive-header-title">
                        <span>📜 已完成任务历史</span>
                        <span class="archive-header-count" id="archiveMainCount">0</span>
                    </div>
                    <span class="archive-header-arrow" id="archiveMainArrow">▶</span>
                </div>
                <div id="archiveMainList" style="display: none;">
                    <!-- 按天分组的归档任务列表 -->
                </div>
            </div>
            
            <!-- 右键菜单 -->
            <div class="context-menu" id="contextMenu">
                <div class="context-menu-item" id="pasteImageItem">粘贴图片</div>
            </div>
            
            <div id="tableView" class="table-view-container">
                <!-- 日期范围筛选器 -->
                <div class="table-date-filter-row" style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding: 10px 15px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap;">
                    <span style="font-size: 14px; color: #ccc; font-weight: bold; display: flex; align-items: center; gap: 5px;">📅 日期范围筛选:</span>
                    <button id="btnThisWeek" class="date-filter-btn active" onclick="setDateFilterMode('week')">本周</button>
                    <button id="btnAllTime" class="date-filter-btn" onclick="setDateFilterMode('all')">全部时间</button>
                    <button id="btnCustomDate" class="date-filter-btn" onclick="setDateFilterMode('custom')">自定义</button>
                    <div id="customDateInputs" style="display: none; align-items: center; gap: 5px;">
                        <input type="date" id="filterStartDate" onchange="applyCustomDateFilter()" style="padding: 4px 8px; background: #222; border: 1px solid #444; border-radius: 4px; color: #fff; font-size: 12px;">
                        <span style="color: #aaa; font-size: 12px;">至</span>
                        <input type="date" id="filterEndDate" onchange="applyCustomDateFilter()" style="padding: 4px 8px; background: #222; border: 1px solid #444; border-radius: 4px; color: #fff; font-size: 12px;">
                    </div>
                    <span id="dateRangeDisplay" style="font-size: 12px; color: #888; margin-left: auto;"></span>
                </div>
                
                <table class="task-table">
                    <thead>
                        <tr>
                            <th>任务内容</th>
                            <th>优先级</th>
                            <th>类型</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 检测运行环境
        const isElectron = typeof require !== 'undefined' && typeof process !== 'undefined';
        
        // 显示环境提示
        if (!isElectron) {
            console.warn('⚠️ 警告：此应用需要在Electron环境中运行！');

            const now = new Date();

            const diffToMonday = day === 0 ? -6 : 1 - day;
            
            const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() + diffToMonday);
            monday.setHours(0, 0, 0, 0);
            
            const sunday = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);
            
            return { start: monday.getTime(), end: sunday.getTime() };
        }

        function render() {
            const list = document.getElementById('notesList');
            if (!list) return;
            list.innerHTML = '';

            let listTasks = [];
            if (currentFilter === 'all') {
                listTasks = [...notes, ...archivedNotes];
            } else if (currentFilter === 'done') {
                listTasks = [...notes.filter(x => x.done), ...archivedNotes];
            } else {
                listTasks = [...notes];
            }

            let filtered = [...listTasks];
            if (currentFilter === 'undone') filtered = filtered.filter(x => !x.done);
            if (currentFilter === 'p3') filtered = filtered.filter(x => x.p === 3);
            if (currentFilter === 'p2') filtered = filtered.filter(x => x.p === 2);
            if (currentFilter === 'p1') filtered = filtered.filter(x => x.p === 1);
            
            // 类型过滤
            if (currentTypeView === 'short') filtered = filtered.filter(x => x.type === 'short');
            if (currentTypeView === 'long') filtered = filtered.filter(x => x.type === 'long');

            filtered.sort((a, b) => {
                // 1. 先按完成状态排序：已完成的放下面
                const aDone = a.done ? 1 : 0;
                const bDone = b.done ? 1 : 0;
                if (aDone !== bDone) {
                    return aDone - bDone;
                }
                
                // 2. 再按优先级排序
                let priorityResult = 0;
                if (sortDirections.priority === 'asc') {
                    priorityResult = a.p - b.p;
                } else {
                    priorityResult = b.p - a.p;
                }
                if (priorityResult !== 0) {
                    return priorityResult;
                }
                
                // 3. 最后按时间排序
                if (sortDirections.time === 'asc') {
                    return a.ts - b.ts;
                } else {
                    return b.ts - a.ts;
                }
            });

            // 分页/滚动追加懒渲染：截取前 cardRenderLimit 条
            const toRender = filtered.slice(0, cardRenderLimit);

            toRender.forEach(n => {
                const card = document.createElement('div');
                card.className = 'note-card';
                const pColor = n.p === 1 ? '#22cc88' : n.p === 2 ? '#ffcc00' : '#ff4444';
                const typeColor = n.type === 'short' ? '#2196F3' : '#9C27B0';
                const typeText = n.type === 'short' ? '短期' : '长期';
                
                if (!n.type) n.type = 'short';

                let commentsHtml = '';
                if (n.comments && n.comments.length > 0) {
                    commentsHtml = `<div class="comments-section">
                        ${n.comments.map((c, ci) => `
                            <div class="single-comment">
                                <span class="comment-text">${lazyloadifyHtml(renderCommentText(c.text))}</span>
                                <span class="comment-delete" onclick="deleteComment(${n.id}, ${ci})">✕</span>
                            </div>
                        `).join('')}
                    </div>`;
                }

                // 处理大图和表情懒加载，将 content 处理为 data-src 格式
                const contentHtml = lazyloadifyHtml(n.content);

                card.innerHTML = `
                    <div class="note-date">${formatDate(n.ts)}</div>
                    <div class="note-content-editable" contenteditable="true" data-note-id="${n.id}" onblur="handleNoteBlur(this)" onkeydown="handleNoteKeydown(event)">${contentHtml}</div>
                    <div class="note-footer">
                        <div>
                            <span class="priority-tag" style="background:${pColor};color:#fff;cursor:pointer" onclick="togglePriority(${n.id})" title="点击切换优先级">${n.p === 1 ? '低' : n.p === 2 ? '中' : '高'}</span>
                            <span class="type-tag" style="background:${typeColor};color:#fff;cursor:pointer" onclick="toggleType(${n.id})" title="点击切换类型">${typeText}</span>
                            <span class="status-tag ${n.done ? 'status-done' : 'status-undone'}" style="cursor:pointer" onclick="toggleDone(${n.id})" title="点击切换完成状态">${n.done ? '已完成' : '未完成'}</span>
                        </div>
                        <div class="note-actions">
                            <span class="icon" title="完成" onclick="toggleDone(${n.id})"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
                            <span class="icon" title="评论" onclick="toggleComment(${n.id})"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z"/></svg></span>
                            <span class="icon" title="删除" onclick="deleteNote(${n.id})"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></span>
                        </div>
                    </div>
                    ${commentsHtml}
                    <div class="comment-input-area" id="commentArea_${n.id}" style="display:none">
                        <div class="comment-input-wrapper">
                            <div class="comment-input" id="c_${n.id}" contenteditable="true" data-placeholder="添加批注…" onkeydown="handleCommentKeydown(event, ${n.id})"></div>
                        </div>
                        <button class="emoji-toggle" onclick="toggleEmojiPanel(${n.id})">表情包</button>
                        <button class="send-btn" onclick="addComment(${n.id})">发送</button>
                    </div>
                    <div class="emoji-panel" id="emoji_${n.id}">
                        <button class="emoji-import-btn" onclick="importMeme(${n.id})" title="导入表情包">+</button>
                        ${memeImages.map(img => `<img class="emoji lazy-img" data-src="表情包/${img}" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1' height='1'></svg>" onclick="insertEmoji('c_${n.id}', ${n.id}, '${img}')" />`).join('')}
                    </div>
                `;
                list.appendChild(card);
            });

            // 滚动加载哨兵机制
            if (filtered.length > cardRenderLimit) {
                const sentinel = document.createElement('div');
                sentinel.id = 'notesListSentinel';
                sentinel.style.cssText = 'height: 40px; line-height: 40px; margin: 15px 0; text-align: center; color: #888; font-size: 13px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px dashed rgba(255,255,255,0.05); cursor: pointer;';
                sentinel.textContent = `向下滚动加载更多历史任务 (已展示 ${cardRenderLimit}/${filtered.length})`;
                list.appendChild(sentinel);
            }

            // 重新绑定观察器
            bindLazyImages();
            bindSentinelObserver();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        let isArchiveExpanded = false;
        let expandedArchiveGroups = {}; // 存储按天展开的日期 key，格式为 { '2026-06-29': true }

        window.toggleArchiveMainPanel = () => {
            isArchiveExpanded = !isArchiveExpanded;
            const mainList = document.getElementById('archiveMainList');
            const arrow = document.getElementById('archiveMainArrow');
            const header = document.getElementById('archiveHeader');
            if (isArchiveExpanded) {
                mainList.style.display = 'block';
                arrow.textContent = '▼';
                header.classList.add('active');
                renderArchiveHistory();
            } else {
                mainList.style.display = 'none';
                arrow.textContent = '▶';
                header.classList.remove('active');
            }
        };

        window.toggleArchiveGroup = dateStr => {
            expandedArchiveGroups[dateStr] = !expandedArchiveGroups[dateStr];
            const groupContent = document.getElementById(`archive_group_${dateStr}`);
            const arrow = document.getElementById(`archive_group_arrow_${dateStr}`);
            const header = document.getElementById(`archive_group_header_${dateStr}`);
            if (expandedArchiveGroups[dateStr]) {
                groupContent.style.display = 'block';
                arrow.textContent = '▼';
                header.classList.add('active');
                renderArchiveGroupItems(dateStr);
            } else {
                groupContent.style.display = 'none';
                arrow.textContent = '▶';
                header.classList.remove('active');
            }
        };

        function renderArchiveHistory() {
            const mainList = document.getElementById('archiveMainList');
            const mainCount = document.getElementById('archiveMainCount');
            
            mainCount.textContent = archivedNotes.length;
            
            if (!isArchiveExpanded) return;
            
            if (archivedNotes.length === 0) {
                mainList.innerHTML = '<div style="text-align: center; color: #888; padding: 20px; font-size: 14px;">暂无归档历史</div>';
                return;
            }
            
            // 按天分组
            const groups = {};
            archivedNotes.forEach(n => {
                const d = new Date(n.doneTime || n.ts || Date.now());
                const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                if (!groups[dateStr]) {
                    groups[dateStr] = [];
                }
                groups[dateStr].push(n);
            });
            
            // 排序日期
            const sortedDates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));
            
            let html = '';
            html += `<div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                <button class="archive-btn-delete" style="font-size: 12px; padding: 5px 12px;" onclick="clearArchiveHistory(event)">清空所有归档</button>
            </div>`;

            sortedDates.forEach(dateStr => {
                const count = groups[dateStr].length;
                const weekday = getWeekday(dateStr);
                const isGroupExpanded = !!expandedArchiveGroups[dateStr];
                const arrow = isGroupExpanded ? '▼' : '▶';
                const activeClass = isGroupExpanded ? 'active' : '';
                const displayStyle = isGroupExpanded ? 'block' : 'none';
                
                html += `
                    <div class="archive-group">
                        <div class="archive-group-header ${activeClass}" id="archive_group_header_${dateStr}" onclick="toggleArchiveGroup('${dateStr}')">
                            <span>📅 ${dateStr} (${weekday})</span>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span class="archive-header-count">${count} 个任务</span>
                                <span class="archive-group-arrow" id="archive_group_arrow_${dateStr}">${arrow}</span>
                            </div>
                        </div>
                        <div class="archive-group-content" id="archive_group_${dateStr}" style="display: ${displayStyle};">
                            <!-- 具体任务延迟到展开时渲染 -->
                        </div>
                    </div>
                `;
            });
            
            mainList.innerHTML = html;
            
            // 如果有些组之前是展开的，重新把它们的内容画一下
            sortedDates.forEach(dateStr => {
                if (expandedArchiveGroups[dateStr]) {
                    renderArchiveGroupItems(dateStr, groups[dateStr]);
                }
            });
        }

        function renderArchiveGroupItems(dateStr, groupNotes) {
            const groupContent = document.getElementById(`archive_group_${dateStr}`);
            if (!groupContent) return;
            
            if (!groupNotes) {
                groupNotes = archivedNotes.filter(n => {
                    const d = new Date(n.doneTime || n.ts || Date.now());
                    const dStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    return dStr === dateStr;
                });
            }
            
            groupNotes.sort((a, b) => (b.doneTime || b.ts || 0) - (a.doneTime || a.ts || 0));
            
            const limit = archiveRenderLimits[dateStr] || 15;
            const toRender = groupNotes.slice(0, limit);

            let html = '';
            toRender.forEach(n => {
                const doneDate = new Date(n.doneTime || n.ts || Date.now());
                const timeStr = `${String(doneDate.getHours()).padStart(2, '0')}:${String(doneDate.getMinutes()).padStart(2, '0')}:${String(doneDate.getSeconds()).padStart(2, '0')}`;
                
                const pColor = n.p === 1 ? '#22cc88' : n.p === 2 ? '#ffcc00' : '#ff4444';
                const pText = n.p === 1 ? '低' : n.p === 2 ? '中' : '高';
                
                const typeColor = n.type === 'long' ? '#9C27B0' : '#2196F3';
                const typeText = n.type === 'long' ? '长期' : '短期';
                
                let bodyContent = n.content;
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = bodyContent;
                const imgs = tempDiv.getElementsByTagName('img');
                for (let i = 0; i < imgs.length; i++) {
                    const src = imgs[i].src || imgs[i].getAttribute('src');
                    imgs[i].setAttribute('onclick', `zoomImage(event, "${src.replace(/"/g, '\\"')}")`);
                    imgs[i].title = '点击放大图片';
                }
                bodyContent = lazyloadifyHtml(tempDiv.innerHTML);

                let commentsHtml = '';
                if (n.comments && n.comments.length > 0) {
                    commentsHtml = `<div class="comments-section" style="margin-top: 10px;">
                        ${n.comments.map((c, ci) => `
                            <div class="single-comment">
                                <span class="comment-text">${lazyloadifyHtml(renderCommentText(c.text))}</span>
                                <span class="comment-delete" onclick="deleteComment(${n.id}, ${ci})">✕</span>
                            </div>
                        `).join('')}
                    </div>`;
                }
                
                html += `
                    <div class="archive-item" style="flex-direction: column; align-items: stretch; gap: 10px;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; width: 100%;">
                            <div class="archive-item-left">
                                <div class="archive-item-content">${bodyContent}</div>
                                <div class="archive-item-meta">
                                    <span class="archive-time-tag">✓ 完成时间: ${timeStr}</span>
                                    <span style="background:${pColor}; color:#fff; padding:1px 6px; border-radius:4px; font-size:10px;">${pText}</span>
                                    <span style="background:${typeColor}; color:#fff; padding:1px 6px; border-radius:4px; font-size:10px;">${typeText}</span>
                                </div>
                            </div>
                            <div class="archive-item-right" style="flex-shrink: 0;">
                                <button class="archive-btn-recover" onclick="toggleComment(${n.id})" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: #ccc;">评论</button>
                                <button class="archive-btn-recover" onclick="recoverArchive(${n.id})">恢复</button>
                                <button class="archive-btn-delete" onclick="deleteArchive(${n.id})">删除</button>
                            </div>
                        </div>
                        
                        ${commentsHtml}
                        
                        <div class="comment-input-area" id="commentArea_${n.id}" style="display:none; width: 100%;">
                            <div class="comment-input-wrapper" style="flex: 1;">
                                <div class="comment-input" id="c_${n.id}" contenteditable="true" data-placeholder="添加批注…" onkeydown="handleCommentKeydown(event, ${n.id})"></div>
                            </div>
                            <button class="emoji-toggle" onclick="toggleEmojiPanel(${n.id})">表情包</button>
                            <button class="send-btn" onclick="addComment(${n.id})">发送</button>
                        </div>
                        <div class="emoji-panel" id="emoji_${n.id}">
                            <button class="emoji-import-btn" onclick="importMeme(${n.id})" title="导入表情包">+</button>
                            ${memeImages.map(img => `<img class="emoji lazy-img" data-src="表情包/${img}" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1' height='1'></svg>" onclick="insertEmoji('c_${n.id}', ${n.id}, '${img}')" />`).join('')}
                        </div>
                    </div>
                `;
            });

            if (groupNotes.length > limit) {
                html += `
                    <div class="archive-sentinel" id="archive_sentinel_${dateStr}" data-date="${dateStr}" style="height: 35px; line-height: 35px; text-align: center; color: #aaa; font-size: 12px; background: rgba(255,255,255,0.02); border-radius: 6px; border: 1px dashed rgba(255,255,255,0.05); margin-top: 10px; cursor: pointer;">
                        向下滚动加载更多历史已完成任务 (已展示 ${limit}/${groupNotes.length})
                    </div>
                `;
            }
            
            groupContent.innerHTML = html;

            bindLazyImages();
            bindSentinelObserver();
        }
        
        function getWeekday(dateStr) {
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const d = new Date(dateStr);
            return weekdays[d.getDay()];
        }

        window.zoomImage = (e, src) => {
            e.stopPropagation();
            const modal = document.getElementById('imgModal');
            const modalImg = document.getElementById('modalImg');
            modalImg.src = src;
            modal.style.display = 'flex';
        };
        
        window.closeImgModal = () => {
            const modal = document.getElementById('imgModal');
            modal.style.display = 'none';
        };

        window.recoverArchive = id => {
            const idx = archivedNotes.findIndex(n => n.id === id);
            if (idx !== -1) {
                const note = archivedNotes.splice(idx, 1)[0];
                note.done = false;
                delete note.doneTime;
                notes.push(note);
                save();
                saveArchive();
            }
        };

        window.deleteArchive = id => {
            if (confirm('确定要彻底删除该归档任务吗？不可恢复！')) {
                const idx = archivedNotes.findIndex(n => n.id === id);
                if (idx !== -1) {
                    archivedNotes.splice(idx, 1);
                    saveArchive();
                }
            }
        };

        window.clearArchiveHistory = e => {
            if (e) e.stopPropagation();
            if (confirm('确定要清空所有已归档的历史任务吗？这将彻底删除所有历史记录，不可恢复！')) {
                archivedNotes = [];
                saveArchive();
            }
        };

        // 右键菜单和图片粘贴功能
        let currentEditableElement = null;
        
        document.addEventListener('contextmenu', (e) => {
            const target = e.target;
            const editable = target.closest('.note-content-editable, .table-content');
            
            if (editable) {
                e.preventDefault();
                currentEditableElement = editable;
                
                const menu = document.getElementById('contextMenu');
                menu.style.left = e.pageX + 'px';
                menu.style.top = e.pageY + 'px';
                menu.classList.add('show');
            }
        });
        
        document.addEventListener('click', () => {
            document.getElementById('contextMenu').classList.remove('show');
        });
        
        document.getElementById('pasteImageItem').onclick = async () => {
            if (!currentEditableElement) return;
            
            // 先获取元素引用，后面可能被重置
            const editable = currentEditableElement;
            
            try {
                const items = await navigator.clipboard.read();
                
                for (const item of items) {
                    if (item.types.includes('image/png') || item.types.includes('image/jpeg') || item.types.includes('image/webp') || item.types.includes('image/gif')) {
                        const blob = await item.getType(item.types.find(t => t.startsWith('image/')));
                        
                        // 将blob转换为base64
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const base64Data = reader.result;
                            
                            const img = document.createElement('img');
                            img.src = base64Data;
                            img.style.maxWidth = '100%';
                            img.style.maxHeight = '200px';
                            img.style.objectFit = 'contain';
                            img.style.borderRadius = '8px';
                            img.style.margin = '4px 0';
                            
                            editable.appendChild(img);
                            
                            // 检查是表格视图还是卡片视图
                            if (editable.classList.contains('table-content')) {
                                const noteId = parseInt(editable.parentElement.getAttribute('data-note-id'));
                                const n = notes.find(x => x.id === noteId);
                                if (n) {
                                    n.content = editable.innerHTML;
                                    save();
                                    console.log('表格视图图片已保存');
                                }
                            } else {
                                updateNoteContent(editable);
                                console.log('卡片视图图片已保存');
                            }
                        };
                        reader.readAsDataURL(blob);
                        break;
                    }
                }
            } catch (err) {
                console.error('粘贴图片失败:', err);
                alert('粘贴图片失败，请尝试使用Ctrl+V粘贴');
            }
            
            document.getElementById('contextMenu').classList.remove('show');
            currentEditableElement = null;
        };
        
        function handleNoteBlur(editable) {
            updateNoteContent(editable);
        }
        
        function handleNoteKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
            }
        }

        // 处理粘贴事件，支持Ctrl+V粘贴图片
        document.addEventListener('paste', async (e) => {
            const target = e.target;
            const editable = target.closest('.note-content-editable, .table-content');
            
            if (editable && e.clipboardData && e.clipboardData.files.length > 0) {
                for (let i = 0; i < e.clipboardData.files.length; i++) {
                    const file = e.clipboardData.files[i];
                    if (file.type.startsWith('image/')) {
                        e.preventDefault();
                        
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const base64Data = reader.result;
                            
                            const img = document.createElement('img');
                            img.src = base64Data;
                            img.style.maxWidth = '100%';
                            img.style.maxHeight = '200px';
                            img.style.objectFit = 'contain';
                            img.style.borderRadius = '8px';
                            img.style.margin = '4px 0';
                            
                            const selection = window.getSelection();
                            if (selection.rangeCount > 0) {
                                const range = selection.getRangeAt(0);
                                range.deleteContents();
                                range.insertNode(img);
                                range.setStartAfter(img);
                                range.setEndAfter(img);
                                selection.removeAllRanges();
                                selection.addRange(range);
                            } else {
                                editable.appendChild(img);
                            }
                            
                            // 保存内容
                            if (editable.classList.contains('table-content')) {
                                const noteId = parseInt(editable.parentElement.getAttribute('data-note-id'));
                                const n = notes.find(x => x.id === noteId);
                                if (n) {
                                    n.content = editable.innerHTML;
                                    save();
                                }
                            } else {
                                updateNoteContent(editable);
                            }
                        };
                        reader.readAsDataURL(file);
                        break;
                    }
                }
            }
        });
        
        function updateNoteContent(editable) {
            const noteId = parseInt(editable.getAttribute('data-note-id'));
            if (!isNaN(noteId)) {
                const note = notes.find(n => n.id === noteId);
                if (note) {
                    note.content = editable.innerHTML;
                    save();
                }
            }
        }
        
        function updateTableNote(noteId, editable) {
            const note = notes.find(n => n.id === noteId);
            if (note) {
                note.content = editable.innerHTML;
                save();
            }
        }
        
        function handleTableNoteKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
            }
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        function renderCommentText(text) {
            const escaped = escapeHtml(text);
            return escaped.replace(/\[img\](.*?)\[\/img\]/g, '<img src="表情包/$1" style="width: 100px; height: 100px; object-fit: cover; vertical-align: middle; border-radius: 8px;">');
        }

        window.toggleDone = id => {
            const n = notes.find(x => x.id === id);
            if (n) {
                n.done = !n.done;
                if (n.done) {

            let text = '';
            if (input) {
                const children = input.childNodes;
                children.forEach(child => {
                    if (child.nodeType === Node.TEXT_NODE) {
                        text += child.textContent;
                    } else if (child.nodeType === Node.ELEMENT_NODE && child.tagName === 'IMG') {
                        const src = child.src;
                        const imgName = src.split('/').pop();
                        text += `[img]${imgName}[/img]`;
                    }
                });
                text = text.trim();
                if (!text) return;
                
                getTaskAndSave(id, n => {
                    if (!n.comments) n.comments = [];
                    n.comments.push({ text: text, time: Date.now() });

                input.innerHTML = '';

                    if (blob) {

                        reader.onloadend = () => {

                            img.style.margin = '4px 0';
                            
                            document.getElementById('noteInput').appendChild(img);
                        };
                        reader.readAsDataURL(blob);
                    }
                } else if (item.kind === 'string' && item.type === 'text/plain') {
                    item.getAsString((text) => {
                        const sel = window.getSelection();
                        if (sel.rangeCount > 0) {
                            const range = sel.getRangeAt(0);
                            range.deleteContents();
                            range.insertNode(document.createTextNode(text));

        function updateDateRangeDisplay() {
            const display = document.getElementById('dateRangeDisplay');
            if (!display) return;
            if (dateFilterMode === 'week') {
                const range = getThisWeekRange();
                display.textContent = `本周范围: ${formatSimpleDate(range.start)} 至 ${formatSimpleDate(range.end)}`;
            } else if (dateFilterMode === 'all') {
                display.textContent = '范围: 全部历史时间';
            } else {
                const startVal = document.getElementById('filterStartDate').value;
                const endVal = document.getElementById('filterEndDate').value;
                if (startVal && endVal) {
                    display.textContent = `当前范围: ${startVal} 至 ${endVal}`;
                } else {
                    display.textContent = '请选择完整的起止日期';
                }
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            if (!tbody) return;
            
            let startTs = 0;
            let endTs = 0;
            if (dateFilterMode === 'week') {
                const r = getThisWeekRange();
                startTs = r.start;
                endTs = r.end;
            } else if (dateFilterMode === 'all') {
                startTs = 0;
                endTs = Infinity;
            } else {
                const startVal = document.getElementById('filterStartDate').value;
                const endVal = document.getElementById('filterEndDate').value;
                if (startVal && endVal) {
                    startTs = new Date(startVal + 'T00:00:00').getTime();
                    endTs = new Date(endVal + 'T23:59:59').getTime();
                } else {
                    const r = getThisWeekRange();
                    startTs = r.start;
                    endTs = r.end;
                }
            }

            // 合并过滤数据：未完成任务始终可见，已完成任务按日期筛选
            let tableTasks = [];
            
            notes.forEach(n => {
                if (!n.done) {
                    tableTasks.push(n);
                } else {
                    const doneT = n.doneTime || n.ts || Date.now();
                    if (doneT >= startTs && doneT <= endTs) {
                        tableTasks.push(n);
                    }
                }
            });
            
            archivedNotes.forEach(n => {
                const doneT = n.doneTime || n.ts || Date.now();
                if (doneT >= startTs && doneT <= endTs) {
                    tableTasks.push(n);
                }
            });

            let filtered = [...tableTasks];
            
            if (currentFilter === 'undone') filtered = filtered.filter(x => !x.done);
            if (currentFilter === 'done') filtered = filtered.filter(x => x.done);
            if (currentFilter === 'p3') filtered = filtered.filter(x => x.p === 3);
            if (currentFilter === 'p2') filtered = filtered.filter(x => x.p === 2);
            if (currentFilter === 'p1') filtered = filtered.filter(x => x.p === 1);
            
            // 类型过滤
            if (currentTypeView === 'short') filtered = filtered.filter(x => x.type === 'short');
            if (currentTypeView === 'long') filtered = filtered.filter(x => x.type === 'long');
            
            filtered.sort((a, b) => {
                // 1. 先按完成状态排序：已完成的放下面
                const aDone = a.done ? 1 : 0;
                const bDone = b.done ? 1 : 0;
                if (aDone !== bDone) {
                    return aDone - bDone;
                }
                
                // 2. 再按优先级排序
                let priorityResult = 0;
                if (sortDirections.priority === 'asc') {
                    priorityResult = a.p - b.p;
                } else {
                    priorityResult = b.p - a.p;
                }
                if (priorityResult !== 0) {
                    return priorityResult;
                }
                
                // 3. 最后按时间排序
                if (sortDirections.time === 'asc') {
                    return a.ts - b.ts;
                } else {
                    return b.ts - a.ts;
                }
            });
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #666; padding: 20px;">暂无任务</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(n => {
                if (!n.type) n.type = 'short';
                
                const pColor = n.p === 1 ? '#4CAF50' : n.p === 2 ? '#FF9800' : '#f44336';
                const pText = n.p === 1 ? '低' : n.p === 2 ? '中' : '高';
                const doneColor = n.done ? '#4CAF50' : '#f44336';
                const doneText = n.done ? '已完成' : '未完成';
                const typeColor = n.type === 'short' ? '#2196F3' : '#9C27B0';
                const typeText = n.type === 'short' ? '短期' : '长期';

                // 批注/评论展示
                let commentsHtml = '';
                if (n.comments && n.comments.length > 0) {
                    commentsHtml = `
                        <div class="comments-section" style="margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 6px;">
                            ${n.comments.map((c, ci) => `
                                <div class="single-comment" style="font-size: 11px; background: rgba(255,255,255,0.03); margin-bottom: 4px; padding: 3px 6px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
                                    <span class="comment-text" style="color: #aaa; text-align: left;">${lazyloadifyHtml(renderCommentText(c.text))}</span>
                                    <span class="comment-delete" onclick="deleteComment(${n.id}, ${ci}); renderTable();" style="cursor: pointer; color: #ef5350; margin-left: 8px; font-weight: bold;">✕</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                // 快捷评论框
                let commentInputHtml = `
                    <div class="comment-input-area" id="tableCommentArea_${n.id}" style="display:none; margin-top:8px; padding:6px; background:rgba(0,0,0,0.25); border-radius:6px; border: 1px solid rgba(255,255,255,0.05);">
                        <div class="comment-input-wrapper" style="margin-bottom: 5px;">
                            <div class="comment-input" id="tc_${n.id}" contenteditable="true" data-placeholder="添加批注…" onkeydown="handleTableCommentKeydown(event, ${n.id})" style="min-height: 24px; font-size:12px; color:#fff; outline:none; text-align: left; background:transparent;"></div>
                        </div>
                        <div style="display: flex; justify-content: flex-end; gap: 5px;">
                            <button onclick="addTableComment(${n.id})" style="font-size:11px; padding: 3px 8px; background:#4CAF50; border:none; color:#fff; border-radius:4px; cursor:pointer;">发送</button>
                        </div>
                    </div>
                `;
                
                return `
                    <tr data-note-id="${n.id}">
                        <td style="text-align: left; vertical-align: top; max-width: 350px;">
                            <div class="table-content" contenteditable="true" onblur="updateTableNote(${n.id}, this)" onkeydown="handleTableNoteKeydown(event)" title="点击编辑任务内容" style="outline: none; color: #fff; line-height: 1.5; word-break: break-all;">${lazyloadifyHtml(n.content)}</div>
                            ${commentsHtml}
                            ${commentInputHtml}
                        </td>
                        <td style="vertical-align: middle;"><span style="background:${pColor};color:#fff;padding:3px 8px;border-radius:4px;font-size:12px;cursor:pointer" onclick="togglePriority(${n.id});renderTable();" title="点击切换优先级">${pText}</span></td>
                        <td style="vertical-align: middle;"><span style="background:${typeColor};color:#fff;padding:3px 8px;border-radius:4px;font-size:12px;cursor:pointer" onclick="toggleType(${n.id});renderTable();" title="点击切换类型">${typeText}</span></td>
                        <td style="vertical-align: middle;"><span style="background:${doneColor};color:#fff;padding:3px 8px;border-radius:4px;font-size:12px;cursor:pointer" onclick="toggleDone(${n.id});renderTable();" title="点击切换完成状态">${doneText}</span></td>
                        <td style="font-size:12px;color:#888;vertical-align: middle;">${formatDate(n.ts)}</td>
                        <td style="vertical-align: middle; white-space: nowrap;">
                            <button onclick="toggleTableComment(${n.id})" style="background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); color:#ccc; padding:5px 8px; border-radius:4px; cursor:pointer; margin-right:5px;">💬评论</button>
                            <button onclick="toggleDone(${n.id});renderTable();" style="background:rgba(76,175,80,0.2);border:none;color:#81c784;padding:5px 8px;border-radius:4px;cursor:pointer;margin-right:5px;">${n.done ? '撤销' : '完成'}</button>
                            <button onclick="deleteNote(${n.id});renderTable();" style="background:rgba(244,67,54,0.2);border:none;color:#ef5350;padding:5px 8px;border-radius:4px;cursor:pointer;">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
            bindLazyImages();
        }

        window.toggleTableComment = (id) => {
            const area = document.getElementById(`tableCommentArea_${id}`);
            if (area) {
                area.style.display = area.style.display === 'none' ? 'block' : 'none';
                if (area.style.display === 'block') {
                    const input = document.getElementById(`tc_${id}`);
                    if (input) input.focus();
                }
            }
        };

        window.handleTableCommentKeydown = (e, id) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                addTableComment(id);
            }
        };

        window.addTableComment = (id) => {
            const input = document.getElementById(`tc_${id}`);
            if (!input) return;
            const text = input.textContent.trim();
            if (!text) return;
            
            getTaskAndSave(id, n => {
                if (!n.comments) n.comments = [];
                n.comments.push({ text: text, time: Date.now() });
            });
            
            renderTable();
        };

        window.updateTableNote = (noteId, element) => {
            getTaskAndSave(noteId, n => {
                const newContent = element.innerHTML.trim();
                if (newContent && newContent !== n.content) {
                    n.content = newContent;
                } else if (!newContent) {
                    element.innerHTML = n.content;
                }
            });
        };

        const bgFileInput = document.getElementById('bgFileInput');
        const importBgBtn = document.getElementById('importBgBtn');
        
        importBgBtn.onclick = () => {
            bgFileInput.click();
        };
        
        bgFileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                console.log('开始加载文件:', file.name, file.size);
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const imgUrl = event.target.result;
                    console.log('文件加载完成，数据长度:', imgUrl.length);
                    
                    // 保存图片到Draws文件夹
                    const timestamp = Date.now();
                    const ext = file.name.split('.').pop() || 'png';
                    const fileName = `custom_bg_${timestamp}.${ext}`;
                    
                    // 通过主进程保存图片
                    const { ipcRenderer } = require('electron');
                    
                    // 监听保存结果
                    ipcRenderer.once('save-background-image-result', (event, result) => {
                        if (result.success) {
                            console.log('背景保存成功，路径:', result.filePath);
                            
                            // 重新初始化背景选择器
                            bgContainer.innerHTML = '';
                            bgContainer.appendChild(bgOverlay);
                            bgSelector.innerHTML = '';
                            bgElements = [];
                            
                            // 重新初始化并选中新添加的背景
                            initBgImages().then(() => {
                                // 找到新添加的背景索引（应该是最后一个）
                                const newIndex = bgElements.length - 1;
                                if (newIndex >= 0) {
                                    switchBg(newIndex);
                                }
                            });
                            
                            alert('背景图片导入成功！');
                        } else {
                            console.error('背景保存失败:', result.error);
                            alert('背景图片导入失败：' + result.error);
                        }
                    });
                    
                    ipcRenderer.send('save-background-image', { base64Data: imgUrl, fileName: fileName });
                };
                reader.readAsDataURL(file);
            }
        };
        
        window.importMeme = (noteId) => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const imgUrl = event.target.result;
                        const img = document.createElement('img');
                        img.src = imgUrl;
                        img.className = 'preview-img';
                        img.alt = '[img]';
                        
                        img.onclick = (e) => {
                            e.stopPropagation();
                            img.remove();
                        };
                        
                        const commentInput = document.getElementById(`c_${noteId}`);
                        commentInput.appendChild(img);
                        commentInput.focus();
                        commentInput.setAttribute('data-has-content', 'true');
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        };
    </script>
    
    <!-- 图片预览 Modal -->
    <div id="imgModal" class="img-modal" onclick="closeImgModal()">
        <img id="modalImg" src="" alt="放大图">
    </div>
</body>
</html>
